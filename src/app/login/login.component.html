<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h1>✨ Personalised Storybook Creator</h1>
      <p>Sign in to craft your unique adventure</p>
    </div>

    <div class="login-body">
      <div class="login-illustration">📖</div>

      <p class="login-tagline">Create magical, personalised stories for your little ones</p>

      <button class="google-btn-wrapper" (click)="signInWithGoogle()">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" width="20" height="20" />
        Sign in with Google
      </button>
    </div>

  </div>
</div>
