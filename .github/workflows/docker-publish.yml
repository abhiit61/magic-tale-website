name: Magic Tale Website Build and Push to Docker Hub

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from your GitHub repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Log into your Docker Hub account securely
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker Buildx (enables efficient caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build and Push the Backend Service
      - name: Build and Push Backend Service
        uses: docker/build-push-action@v5
        with:
          context: . # Looks inside the current folder for the service Dockerfile
          file: ./Dockerfile
          push: true
          # Replaces 'latest' and tags it with your Docker Hub account name
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/magictale-website:latest